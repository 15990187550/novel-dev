defaults:
  provider: openai_compatible
  timeout: 30
  retries: 2
  temperature: 0.7

agents:
  brainstorm_agent:
    provider: anthropic
    model: claude-opus-4-6
    timeout: 120
    retries: 3
    temperature: 0.8
    fallback:
      provider: openai_compatible
      model: gpt-4.1
      base_url: https://api.openai.com/v1
      timeout: 60
      retries: 2

  volume_planner_agent:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    timeout: 60

  writer_agent:
    provider: minimax
    model: MiniMax-Text-01
    base_url: https://api.minimax.chat/v1
    timeout: 60
