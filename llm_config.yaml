defaults:
  timeout: 30
  retries: 2
  temperature: 0.7
  max_tokens: 8192
models:
  kimi-for-coding:
    provider: anthropic
    model: kimi-for-coding
    base_url: https://api.kimi.com/coding
    api_key_env: KIMI_API_KEY
    structured_output:
      mode: anthropic_tool
      fallback_to_text: true
  minimax-2-7:
    provider: anthropic
    model: Minimax-2.7
    base_url: https://api.minimaxi.com/anthropic
    api_key_env: MINIMAX_API_KEY
    structured_output:
      mode: anthropic_tool
      fallback_to_text: true
  deepseek:
    provider: anthropic
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/anthropic
    api_key_env: DEEPSEEK_API_KEY
    structured_output:
      mode: anthropic_tool
      tool_choice: auto
      fallback_to_text: true
embedding:
  provider: openai_compatible
  model: bge-m3
  base_url: http://127.0.0.1:9997/v1
  timeout: 30
  retries: 3
  dimensions: 1024
agents:
  brainstorm_agent:
    model: deepseek
    timeout: 240
    retries: 3
    temperature: 0.9
    fallback:
      model: minimax-2-7
      timeout: 240
      temperature: 0.9
      retries: 1
    tasks:
      generate_synopsis:
        temperature: 0.9
        max_tokens: 32768
      generate_synopsis_top_level:
        temperature: 0.9
        max_tokens: 8192
      generate_synopsis_volume_outlines_batch:
        temperature: 0.85
        max_tokens: 8192
      score_synopsis:
        temperature: 0.2
  volume_planner_agent:
    model: kimi-for-coding
    timeout: 240
    fallback:
      model: kimi-for-coding
      timeout: 240
      temperature: 0.85
      retries: 1
    tasks:
      generate_volume_plan:
        timeout: 120
        retries: 3
        temperature: 0.85
        max_tokens: 8192
        orchestration:
          enabled: false
          tool_allowlist:
          - get_volume_planner_context
          - get_novel_state
          - get_synopsis
          - get_novel_documents
          - get_novel_document_full
          max_tool_calls: 3
          tool_timeout_seconds: 5
          max_tool_result_chars: 6000
          retriever_subtasks: []
          enable_subtasks: true
          repairer_subtask: schema_repair
      expand_volume_plan_batch:
        timeout: 120
        retries: 3
        temperature: 0.55
        max_tokens: 8192
      score_volume_plan:
        temperature: 0.2
      revise_volume_plan:
        temperature: 0.65
    retries: 2
    temperature: 0.85
  setting_extractor_agent:
    model: deepseek
    timeout: 200
    fallback:
      model: minimax-2-7
      temperature: 0.2
      timeout: 180
      retries: 2
    tasks:
      extract_setting:
        temperature: 0.35
        max_tokens: 65536
        timeout: 240
        retries: 3
    retries: 1
    temperature: 0.2
  setting_consolidation_agent:
    model: deepseek
    timeout: 240
    temperature: 0.1
    max_tokens: 65536
    fallback:
      model: minimax-2-7
      temperature: 0.1
      timeout: 240
      retries: 1
    retries: 2
    tasks:
      consolidate:
        temperature: 0.1
        max_tokens: 65536
        timeout: 240
        retries: 3
  style_profiler_agent:
    model: kimi-for-coding
    timeout: 60
    fallback:
      model: minimax-2-7
      temperature: 0.5
      timeout: 60
      retries: 1
    retries: 2
    temperature: 0.5
  file_classifier:
    model: kimi-for-coding
    timeout: 60
    fallback:
      model: minimax-2-7
      temperature: 0.5
      timeout: 60
      retries: 1
    retries: 2
    temperature: 0.5
  entity_classifier_agent:
    model: deepseek
    timeout: 60
    temperature: 0.2
    fallback:
      model: minimax-2-7
      temperature: 0.2
      timeout: 60
      retries: 1
    retries: 2
  outline_workbench_service:
    model: kimi-for-coding
    timeout: 180
    temperature: 0.5
    fallback:
      model: minimax-2-7
      temperature: 0.5
      timeout: 180
      retries: 1
    retries: 2
    tasks:
      revise_synopsis_with_feedback:
        timeout: 180
        retries: 1
        temperature: 0.5
        fallback:
          model: minimax-2-7
          timeout: 120
          retries: 1
          temperature: 0.5
  setting_workbench_service:
    model: deepseek
    timeout: 180
    temperature: 0.55
    max_tokens: 12000
    orchestration:
      enabled: true
      tool_allowlist:
      - get_setting_workbench_context
      - query_entity
      - get_novel_state
      - get_novel_documents
      - search_domain_documents
      - get_novel_document_full
      max_tool_calls: 8
      tool_timeout_seconds: 5
      max_tool_result_chars: 6000
      retriever_subtasks: []
      enable_subtasks: true
      repairer_subtask: schema_repair
    fallback:
      model: minimax-2-7
      temperature: 0.55
      timeout: 180
      retries: 1
    retries: 2
  context_agent:
    model: minimax-2-7
    timeout: 60
    orchestration:
      enabled: true
      tool_allowlist:
      - get_context_location_details
      - get_context_entity_states
      - get_context_foreshadowing_details
      - get_context_timeline_events
      - get_novel_state
      - get_chapter_draft_status
      max_tool_calls: 3
      tool_timeout_seconds: 5
      max_tool_result_chars: 1600
      retriever_subtasks: []
      enable_subtasks: true
      validator_subtask: location_context_quality
      repairer_subtask: schema_repair
    fallback:
      model: kimi-for-coding
      temperature: 0.45
      retries: 1
      timeout: 60
    retries: 2
    temperature: 0.45
  writer_agent:
    model: kimi-for-coding
    timeout: 120
    temperature: 0.9
    fallback:
      model: deepseek
      temperature: 0.9
      timeout: 120
      retries: 1
    tasks:
      generate_beat:
        temperature: 0.95
      rewrite_beat:
        temperature: 0.8
      generate_relay:
        model: deepseek
        timeout: 15
        temperature: 0.2
        fallback:
          model: minimax-2-7
          temperature: 0.2
          timeout: 15
          retries: 1
    retries: 2
  critic_agent:
    model: kimi-for-coding
    timeout: 180
    temperature: 0.3
    fallback:
      model: minimax-2-7
      temperature: 0.3
      timeout: 60
      retries: 1
    tasks:
      score_chapter:
        temperature: 0.2
        max_tokens: 8192
      score_beats:
        temperature: 0.2
    retries: 2
  editor_agent:
    model: kimi-for-coding
    timeout: 60
    temperature: 0.6
    fallback:
      model: kimi-for-coding
      temperature: 0.6
      timeout: 60
      retries: 1
    tasks:
      polish_beat:
        temperature: 0.6
    retries: 2
  fast_review_agent:
    model: deepseek
    timeout: 90
    temperature: 0.2
    fallback:
      model: kimi-for-coding
      temperature: 0.2
      timeout: 60
      retries: 1
    tasks:
      fast_review_check:
        temperature: 0.2
    retries: 2
  librarian_agent:
    model: kimi-for-coding
    timeout: 180
    temperature: 0.2
    fallback:
      model: minimax-2-7
      temperature: 0.2
      timeout: 60
      retries: 1
    tasks:
      extract:
        temperature: 0.15
        max_tokens: 8192
    retries: 2
