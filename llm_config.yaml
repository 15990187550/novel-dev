defaults:
  provider: openai_compatible
  timeout: 30
  retries: 2
  temperature: 0.7
  # 温度分层原则:
  # - 创意型任务(Writer.generate_beat/rewrite_beat, Brainstorm.generate_synopsis): 0.85-1.0
  # - 规划型任务(VolumePlanner.generate/revise, 中间改写): 0.6-0.75
  # - 判断/评分型任务(Critic, FastReview, VolumePlanner.score): 0.2-0.3
  # - 结构化抽取(Librarian, Extractor, Classifier): 0.1-0.3

embedding:
  provider: openai_compatible
  model: text-embedding-3-small
  base_url: https://api.openai.com/v1
  timeout: 30
  retries: 3
  dimensions: 1536

agents:
  brainstorm_agent:
    provider: anthropic
    model: claude-opus-4-6
    timeout: 120
    retries: 3
    temperature: 0.9
    fallback:
      provider: openai_compatible
      model: gpt-4.1
      base_url: https://api.openai.com/v1
      timeout: 60
      retries: 2
    tasks:
      generate_synopsis:
        temperature: 0.9
      score_synopsis:
        temperature: 0.2
      revise_synopsis:
        temperature: 0.7

  volume_planner_agent:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    timeout: 60
    temperature: 0.7
    fallback:
      provider: anthropic
      model: claude-sonnet-4-6
      timeout: 120
    tasks:
      generate_volume_plan:
        timeout: 120
        retries: 3
        temperature: 0.75
      score_volume_plan:
        temperature: 0.2
      revise_volume_plan:
        temperature: 0.65

  setting_extractor_agent:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    timeout: 60
    fallback:
      provider: anthropic
      model: claude-sonnet-4-6
      timeout: 60

  style_profiler_agent:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    timeout: 60
    fallback:
      provider: anthropic
      model: claude-sonnet-4-6
      timeout: 60

  file_classifier:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    timeout: 30
    fallback:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      timeout: 30

  context_agent:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    timeout: 30
    fallback:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      timeout: 30

  writer_agent:
    provider: minimax
    model: MiniMax-Text-01
    base_url: https://api.minimax.chat/v1
    timeout: 60
    temperature: 0.9
    fallback:
      provider: openai_compatible
      model: gpt-4.1
      base_url: https://api.openai.com/v1
      timeout: 60
    tasks:
      generate_beat:
        temperature: 0.95
      rewrite_beat:
        temperature: 0.8
      generate_relay:
        temperature: 0.2
        provider: anthropic
        model: claude-haiku-4-5-20251001
        timeout: 15

  critic_agent:
    provider: anthropic
    model: claude-sonnet-4-6
    timeout: 60
    temperature: 0.3
    fallback:
      provider: openai_compatible
      model: kimi-k2.5
      base_url: https://api.moonshot.cn/v1
      timeout: 60
    tasks:
      score_chapter:
        temperature: 0.2
      score_beats:
        temperature: 0.2

  editor_agent:
    provider: anthropic
    model: claude-sonnet-4-6
    timeout: 60
    temperature: 0.6
    fallback:
      provider: openai_compatible
      model: kimi-k2.5
      base_url: https://api.moonshot.cn/v1
      timeout: 60
    tasks:
      polish_beat:
        temperature: 0.6

  fast_review_agent:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    timeout: 30
    temperature: 0.2
    fallback:
      provider: openai_compatible
      model: kimi-k2.5
      base_url: https://api.moonshot.cn/v1
      timeout: 30
    tasks:
      fast_review_check:
        temperature: 0.2

  librarian_agent:
    provider: anthropic
    model: claude-sonnet-4-6
    timeout: 60
    temperature: 0.2
    fallback:
      provider: openai_compatible
      model: gpt-4.1
      base_url: https://api.openai.com/v1
      timeout: 60
    tasks:
      extract:
        temperature: 0.15
